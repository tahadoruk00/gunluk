<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>YKS & Süreç Takip 2026</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --dark: #1e272e; --tyt: #3498db; --ayt: #9b59b6; --red: #e84118; --bg: #f5f6fa; --green: #2ecc71; --user-color: #6c5ce7; }
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; color: var(--dark); transition: 0.3s; }
        .container { background: white; width: 100%; max-width: 420px; border-radius: 35px; padding: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.1); }
        
        #lockScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .lock-card { background: white; padding: 40px 30px; border-radius: 35px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 85%; max-width: 320px; }
        .lock-input { width: 100%; padding: 15px; border-radius: 18px; border: 2px solid #f1f1f1; text-align: center; font-size: 18px; margin-bottom: 20px; outline: none; box-sizing: border-box; transition: 0.3s; }
        .lock-input:focus { border-color: var(--dark); }

        .quote-card { background: var(--user-color); color: white; padding: 20px; border-radius: 25px; margin-bottom: 20px; transition: 0.5s; position: relative; }
        #dailyQuote { font-size: 14px; font-weight: 600; font-style: italic; line-height: 1.5; margin: 0; padding-right: 15px;}
        .quote-author { font-size: 11px; opacity: 0.8; margin-top: 8px; display: block; font-weight: 700; text-transform: uppercase; }

        .secret-btn { position: absolute; bottom: 10px; right: 10px; width: 15px; height: 15px; background: transparent; border: none; cursor: pointer; border-radius: 50%; z-index: 10; }
        
        .exam-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: #fff; padding: 12px; border-radius: 20px; text-align: center; border: 1px solid #f1f1f1; }
        .stat-val { font-size: 14px; font-weight: 800; display: block; }
        .stat-label { font-size: 9px; color: #95a5a6; font-weight: 700; text-transform: uppercase; }

        .process-card { background: #fff; padding: 15px; border-radius: 20px; text-align: center; border: 1px solid #fceaea; margin-bottom: 20px; }
        .process-val { font-size: 16px; font-weight: 800; color: var(--red); display: block; }
        #otherUserLastSeen { font-size: 10px; color: #95a5a6; margin-top: 8px; font-weight: bold; border-top: 1px solid #f9f9f9; padding-top: 5px; }

        /* MOOD SAYAÇ ALTI GÖRÜNÜM */
        .mood-display-area { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #eee; display: flex; flex-direction: column; gap: 5px; }
        .mood-tag { font-size: 11px; font-weight: 700; }

        .user-selector { display: flex; gap: 12px; margin-bottom: 20px; }
        .profile-card { flex: 1; text-align: center; cursor: pointer; opacity: 0.4; transition: 0.3s; padding: 15px; border-radius: 22px; background: #f8f9fa; position: relative; border: 2px solid transparent; }
        .profile-card.active { opacity: 1; background: #fff; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        #card-taha.active { border-color: #3498db; }
        #card-sude.active { border-color: #e84393; }

        textarea { width: 100%; height: 90px; padding: 15px; border-radius: 20px; border: 2px solid #f1f1f1; box-sizing: border-box; font-family: inherit; resize: none; outline: none; font-size: 15px; }
        .custom-file-upload { display: flex; align-items: center; justify-content: center; gap: 8px; background: #f8f9fa; padding: 12px; border-radius: 15px; cursor: pointer; font-weight: 700; font-size: 13px; margin-top: 10px; border: 2px dashed #eee; }

        .save-btn { background: var(--user-color); color: white; border: none; padding: 18px; border-radius: 22px; width: 100%; font-weight: 800; cursor: pointer; margin: 15px 0; font-size: 15px; transition: 0.4s; }
        
        /* MOOD PANELİ VE ONAY BUTONU */
        .mood-container { display: flex; flex-wrap: wrap; justify-content: space-around; margin: 15px 0; background: #fff; padding: 10px; border-radius: 20px; border: 1px solid #f1f1f1; gap: 5px; }
        .mood-btn { border: none; background: #f8f9fa; padding: 8px; border-radius: 15px; cursor: pointer; transition: 0.3s; font-size: 18px; display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; border: 2px solid transparent; min-width: 60px; }
        .mood-btn span { font-size: 8px; font-weight: 800; text-transform: uppercase; color: #95a5a6; }
        .mood-btn.active { transform: scale(1.05); }
        .mood-btn[data-mood="heyecanlı"].active { background: #fff3e0; border-color: #ff9800; }
        .mood-btn[data-mood="mutlu"].active { background: #e8f5e9; border-color: #4caf50; }
        .mood-btn[data-mood="üzgün"].active { background: #e3f2fd; border-color: #2196f3; }
        .mood-btn[data-mood="yorgun"].active { background: #f3e5f5; border-color: #9c27b0; }
        .mood-btn[data-mood="sinirli"].active { background: #ffebee; border-color: #f44336; }
        
        .mood-confirm-btn { background: var(--dark); color: white; border: none; padding: 8px 15px; border-radius: 12px; font-size: 11px; font-weight: 800; width: 100%; margin-top: 8px; cursor: pointer; display: none; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .archive-display { margin-bottom: 20px; }
        .archive-title { font-size: 12px; font-weight: 800; color: #95a5a6; text-transform: uppercase; margin-bottom: 10px; display: block; text-align: center; }
        .note-bubble { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 20px; margin-bottom: 10px; position: relative; animation: slideIn 0.3s ease-out; border-left: 5px solid var(--user-color); }
        .note-time { font-size: 10px; color: #ccc; position: absolute; top: 10px; right: 15px; }
        .note-text { font-size: 14px; color: #2c3e50; line-height: 1.4; white-space: pre-wrap; margin-top: 5px; }
        .note-img { width: 100%; border-radius: 12px; margin-top: 10px; max-height: 300px; object-fit: cover; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .calendar-box { background: #fff; border-radius: 25px; padding: 15px; border: 1px solid #f1f1f1; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-weight: 800; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { font-size: 12px; padding: 8px 0; border-radius: 10px; cursor: pointer; text-align: center; transition: 0.2s; }
        .cal-day.selected { background: var(--user-color) !important; color: white !important; font-weight: bold; }
        
        #previewContainer { position: relative; margin-top: 10px; }
        #previewContainer img { width: 100%; border-radius: 20px; border: 2px solid var(--user-color); max-height: 200px; object-fit: cover; }
        .nav-btn { background: #f1f2f6; border: none; width: 32px; height: 32px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="lockScreen">
    <div class="lock-card">
        <h2 style="margin-top:0; color:var(--dark); font-weight: 800; letter-spacing: -1px;">Giriş</h2>
        <input type="password" id="passInput" class="lock-input" placeholder="Şifreyi girin">
        <button onclick="unlockApp()" class="save-btn" style="margin:0; background:var(--dark)">Devam Et</button>
    </div>
</div>

<div class="container">
    <div class="quote-card" id="mainQuoteCard">
        <p id="dailyQuote">...</p>
        <span class="quote-author" id="quoteAuthor"></span>
        <button class="secret-btn" onclick="checkAllLogs()"></button>
    </div>

    <div class="exam-grid">
        <div class="stat-card"><span class="stat-val" id="tytCount" style="color: var(--tyt);">--:--</span><span class="stat-label">TYT 2026</span></div>
        <div class="stat-card"><span class="stat-val" id="aytCount" style="color: var(--ayt);">--:--</span><span class="stat-label">AYT 2026</span></div>
    </div>

    <div class="process-card">
        <span class="process-val" id="awayLive">...</span>
        <span class="stat-label">Süreç Takibi</span>
        <div class="mood-display-area">
            <div id="mood-taha-val" class="mood-tag" style="color: #3498db;"></div>
            <div id="mood-sude-val" class="mood-tag" style="color: #e84393;"></div>
        </div>
        <div id="otherUserLastSeen"></div>
    </div>

    <div class="user-selector">
        <div class="profile-card" id="card-taha" onclick="toggleDiary('taha')">
            <span id="name-taha">Taha</span>
        </div>
        <div class="profile-card" id="card-sude" onclick="toggleDiary('sude')">
            <span id="name-sude">Sude</span>
        </div>
    </div>

    <div id="diary-area" style="display:none;">
        <div class="mood-container">
            <button class="mood-btn" data-mood="heyecanlı" onclick="selectMood('heyecanlı')">🤩<span>Heyecanlı</span></button>
            <button class="mood-btn" data-mood="mutlu" onclick="selectMood('mutlu')">😊<span>Mutlu</span></button>
            <button class="mood-btn" data-mood="üzgün" onclick="selectMood('üzgün')">😔<span>Üzgün</span></button>
            <button class="mood-btn" data-mood="yorgun" onclick="selectMood('yorgun')">😴<span>Yorgun</span></button>
            <button class="mood-btn" data-mood="sinirli" onclick="selectMood('sinirli')">😤<span>Sinirli</span></button>
            <button id="moodConfirmBtn" class="mood-confirm-btn" onclick="confirmMood()">DURUMU GÜNCELLE</button>
        </div>

        <textarea id="noteInput" placeholder="Bugün neler başardın?"></textarea>
        <label class="custom-file-upload">
            <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="previewImage()">
            📸 Fotoğraf Ekle
        </label>
        <div id="previewContainer"></div>
        <button id="saveButton" class="save-btn" onclick="saveToFirebase()">Günü Arşivle</button>

        <div class="archive-display">
            <span class="archive-title" id="archiveDateTitle">Günün Akışı</span>
            <div id="notesFlow"></div>
        </div>

        <div class="calendar-box">
            <div class="cal-header">
                <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
                <span id="monthYear">...</span>
                <button class="nav-btn" onclick="changeMonth(1)">›</button>
            </div>
            <div class="cal-grid" id="calendarGrid"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAUnANfxQb3-8rG-ws3l08XD5vGWGdtb2Y",
        authDomain: "yks-gunluk.firebaseapp.com",
        databaseURL: "https://yks-gunluk-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "yks-gunluk",
        storageBucket: "yks-gunluk.firebasestorage.app",
        messagingSenderId: "603273107081",
        appId: "1:603273107081:web:06fc327f84cb1fddd01858"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUserId = '';
    let selectedImageBase64 = "";
    let viewDate = new Date();
    let selectedDateStr = new Date().toLocaleDateString('en-CA');
    let currentNoteRef = null;
    let otherStatusRef = null;
    
    let tempMood = null; // Tıklanan ama onaylanmayan mood

    function unlockApp() {
        const pass = document.getElementById('passInput').value;
        const sTaha = "240708"; 
        const sSude = "050209"; 

        if(pass === sTaha || pass === sSude) {
            document.getElementById('lockScreen').style.display = 'none';
        } else {
            alert("Şifre Yanlış!");
        }
    }

    function toggleDiary(userId) {
        if (currentUserId === userId) {
            cleanupListeners();
            currentUserId = '';
            document.getElementById('diary-area').style.display = 'none';
            document.querySelectorAll('.profile-card').forEach(c => c.classList.remove('active'));
            resetMoodUI();
        } else {
            cleanupListeners();
            currentUserId = userId;
            const color = (userId === 'taha') ? '#3498db' : '#e84393';
            document.documentElement.style.setProperty('--user-color', color);
            document.querySelectorAll('.profile-card').forEach(c => c.classList.remove('active'));
            document.getElementById('card-' + userId).classList.add('active');
            document.getElementById('diary-area').style.display = 'block';
            handlePresence(userId);
            selectDay(new Date().toLocaleDateString('en-CA'));
            resetMoodUI();
        }
    }

    // EMOJIYE TIKLAMA (Ön Seçim)
    function selectMood(mood) {
        const confirmBtn = document.getElementById('moodConfirmBtn');
        
        if (tempMood === mood) {
            tempMood = null;
            confirmBtn.style.display = 'none';
            document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
        } else {
            tempMood = mood;
            confirmBtn.style.display = 'block';
            document.querySelectorAll('.mood-btn').forEach(b => {
                b.classList.remove('active');
                if(b.getAttribute('data-mood') === mood) b.classList.add('active');
            });
        }
    }

    // ONAY BUTONUNA TIKLAMA (Kesinleştirme)
    function confirmMood() {
        if (!tempMood) return;
        const userName = currentUserId === 'taha' ? 'Taha' : 'Sude';
        const displayEl = document.getElementById(`mood-${currentUserId}-val`);
        const confirmBtn = document.getElementById('moodConfirmBtn');

        displayEl.innerText = `${userName} şu an ${tempMood} hissediyor.`;
        
        // Onay sonrası butonu gizle ve seçimi temizle
        confirmBtn.style.display = 'none';
        tempMood = null;
        document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
        
        // Küçük bir görsel efekt
        displayEl.style.opacity = "0";
        setTimeout(() => displayEl.style.opacity = "1", 50);
    }

    function resetMoodUI() {
        tempMood = null;
        document.getElementById('moodConfirmBtn').style.display = 'none';
        document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    }

    function cleanupListeners() {
        if (currentNoteRef) currentNoteRef.off();
        if (otherStatusRef) otherStatusRef.off();
    }

    function handlePresence(myId) {
        const otherId = (myId === 'taha') ? 'sude' : 'taha';
        const otherName = (myId === 'taha') ? 'Sude' : 'Taha';
        const myStatusRef = db.ref(`status/${myId}`);
        myStatusRef.set({ lastSeen: firebase.database.ServerValue.TIMESTAMP });
        
        otherStatusRef = db.ref(`status/${otherId}`);
        otherStatusRef.on('value', (snap) => {
            const data = snap.val();
            const display = document.getElementById('otherUserLastSeen');
            if (data && data.lastSeen) {
                const date = new Date(data.lastSeen);
                display.innerText = `${otherName} son giriş: ${date.toLocaleString('tr-TR', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })}`;
            }
        });
    }

    function selectDay(dateStr) {
        selectedDateStr = dateStr;
        document.getElementById('archiveDateTitle').innerText = new Date(dateStr).toLocaleDateString('tr-TR', { day: 'numeric', month: 'long' }) + " Akışı";
        renderCalendar();
        loadArchive(); 
    }

    function loadArchive() {
        const flow = document.getElementById('notesFlow');
        if (currentNoteRef) currentNoteRef.off();
        currentNoteRef = db.ref(`notes/${currentUserId}/${selectedDateStr}`);
        currentNoteRef.on('value', snap => {
            flow.innerHTML = "";
            const data = snap.val();
            if (data) {
                Object.values(data).reverse().forEach(note => {
                    const time = note.timestamp ? new Date(note.timestamp).toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'}) : "";
                    flow.innerHTML += `
                        <div class="note-bubble">
                            <span class="note-time">${time}</span>
                            <div class="note-text">${note.text}</div>
                            ${note.image ? `<img src="${note.image}" class="note-img">` : ""}
                        </div>`;
                });
            }
        });
    }

    function saveToFirebase() {
        const input = document.getElementById('noteInput');
        const btn = document.getElementById('saveButton');
        if(!input.value && !selectedImageBase64) return;
        btn.disabled = true;
        db.ref(`notes/${currentUserId}/${selectedDateStr}`).push({
            text: input.value,
            image: selectedImageBase64,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
            input.value = ""; selectedImageBase64 = "";
            document.getElementById('previewContainer').innerHTML = "";
            btn.disabled = false;
        });
    }

    function renderCalendar() {
        const grid = document.getElementById("calendarGrid");
        grid.innerHTML = "";
        const month = viewDate.getMonth();
        const year = viewDate.getFullYear();
        document.getElementById("monthYear").innerText = new Intl.DateTimeFormat('tr-TR', { month: 'long', year: 'numeric' }).format(viewDate);
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const shift = firstDay === 0 ? 6 : firstDay - 1;
        for(let i=0; i<shift; i++) grid.innerHTML += `<div></div>`;
        for(let d=1; d<=daysInMonth; d++) {
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isSelected = dateStr === selectedDateStr ? 'selected' : '';
            grid.innerHTML += `<div class="cal-day ${isSelected}" onclick="selectDay('${dateStr}')">${d}</div>`;
        }
    }

    function changeMonth(val) { viewDate.setDate(1); viewDate.setMonth(viewDate.getMonth() + val); renderCalendar(); }

    function previewImage() {
        const file = document.getElementById('fileInput').files[0];
        if (file) {
            const reader = new FileReader();
            reader.onloadend = () => {
                selectedImageBase64 = reader.result;
                document.getElementById('previewContainer').innerHTML = `<img src="${selectedImageBase64}">`;
            };
            reader.readAsDataURL(file);
        }
    }

    function updateTimers() {
        const now = new Date();
        const tyt = new Date("2026-06-20T10:15:00");
        const ayt = new Date("2026-06-21T10:15:00");
        const start = new Date("2026-02-08T22:35:00");
        const calc = (target) => {
            const diff = target - now;
            if (diff <= 0) return "Sınav Başladı!";
            return `${Math.floor(diff/86400000)}g ${Math.floor((diff%86400000)/3600000)}s ${Math.floor((diff%3600000)/60000)}dk`;
        }
        document.getElementById("tytCount").innerText = calc(tyt);
        document.getElementById("aytCount").innerText = calc(ayt);
        const diffS = now - start;
        document.getElementById("awayLive").innerText = `${Math.floor(diffS/86400000)}g ${Math.floor((diffS%86400000)/3600000)}s ${Math.floor((diffS%3600000)/60000)}dk`;
    }

    const quotes = [{s:"Gelecek, hayallerine inananlarındır.",a:"Roosevelt"},{s:"Zorluklar başarıyı değerli kılar.",a:"Atatürk"},{s:"Durmadığın sürece yavaş gitmen mühim değil.",a:"Konfüçyüs"}];
    function setRandomQuote() {
        const q = quotes[Math.floor(Math.random() * quotes.length)];
        document.getElementById('dailyQuote').innerText = q.s;
        document.getElementById('quoteAuthor').innerText = "— " + q.a;
    }

    setRandomQuote();
    updateTimers();
    setInterval(updateTimers, 60000);
</script>
</body>
</html>
